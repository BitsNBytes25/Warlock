services:
  warlock:
    image: ${DOCKERHUB_IMAGE:-bitsnbytes25/warlock:latest}
    container_name: warlock
    ports:
      - "3077:3077"
    environment:
      - SKIP_AUTHENTICATION=false
      - SKIP_2FA=false
      - IP=0.0.0.0
      - NODE_ENV=production
      - WARLOCK_PROFILE=false
    volumes:
      - "data:/app/data"
      - "ssh:/home/warlock/.ssh"
    restart: unless-stopped
volumes:
  data:
  ssh:
