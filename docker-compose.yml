version: '3.8'
services:
  warlock:
    build: .
    container_name: warlock
    ports:
      - "3077:3077"
    environment:
      - SKIP_AUTHENTICATION=false
      - SKIP_2FA=false
    volumes:
      - "/opt/warlock/data:/app/data"
    restart: unless-stopped
