version: '3.8'
services:
  warlock:
    build: .
    container_name: warlock
    ports:
      - "3077:3077"
    environment:
      - SKIP_AUTHENTICATION=false
      - SKIP_2FA=false
      - IP=0.0.0.0
      - NODE_ENV=production
    volumes:
      - "./data:/app/data"
      - "./ssh:/root/.ssh"
    restart: unless-stopped
