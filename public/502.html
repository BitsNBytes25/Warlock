<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>502 Bad Gateway</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			background-color: #f8f9fa;
			color: #343a40;
			transition: background-color 0.3s ease, color 0.3s ease;
		}
		@media (prefers-color-scheme: dark) {
			body {
				background-color: #121212;
				color: #e0e0e0;
			}
		}
		.container {
			text-align: center;
			padding: 2rem;
		}
		h1 {
			font-size: 4rem;
			margin: 0;
			color: #dc3545;
		}
		p {
			font-size: 1.25rem;
			margin-top: 1rem;
			line-height: 1.5;
		}
		.icon {
			font-size: 5rem;
			margin-bottom: 1rem;
		}
	</style>
</head>
<body>
<div class="container">
	<div class="icon">⚠️</div>
	<h1>502</h1>
	<p><strong>Bad Gateway</strong></p>
	<p>Warlock is currently unavailable. Please try again in a few moments.</p>
	<p>
		<em>(If you are the system operator, you may want to check the error logs with <strong>journalctl -fu warlock</strong>.)</em>
	</p>
</div>
</body>
</html>
